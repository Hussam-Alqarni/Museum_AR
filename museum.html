<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>متحفك الخاص - AR</title>

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
</head>
<body>

  <!-- واجهة المستخدم (Overlay) - صممت لتكون طبقة فوق الكاميرا -->
  <div id="ui-overlay">
    
    <!-- الشريط العلوي (زر الرجوع والتوجيهات) -->
    <div class="top-bar">
      <a href="index.html" class="btn-back">
        <!-- أيقونة سهم للرجوع -->
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        العودة للرئيسية
      </a>
      <div class="instruction-badge" id="ar-instruction">
        انقر على زر AR للبدء
      </div>
    </div>

    <!-- الشريط السفلي (قائمة المجسمات - ستايل ايكيا) -->
    <div class="bottom-bar">
      <div class="items-carousel" id="museum-items">
        <!-- تتولد الأزرار هنا عبر الجافاسكريبت -->
      </div>
    </div>

  </div>

  <!-- 
    تفعيل dom-overlay هنا هو السطر السحري الذي يسمح 
    للهاتف بقراءة ضغطاتك على الأزرار أثناء تشغيل الكاميرا
  -->
  <a-scene 
    id="webxr-scene"
    webxr="requiredFeatures: hit-test, local-floor, dom-overlay; overlayElement: #ui-overlay;"
    renderer="colorManagement: true; physicallyCorrectLights: true;"
    vr-mode-ui="enterVRButton: #btn-enter-ar">
    
    <!-- إضاءة ممتازة لإبراز تفاصيل المجسم -->
    <a-light type="ambient" intensity="1"></a-light>
    <a-light type="directional" position="1 2 0.5" intensity="1.2" castShadow="true"></a-light>

    <!-- كاميرا تتبع الأسطح -->
    <a-entity ar-hit-test="target:#reticle">
      <a-camera position="0 1.6 0"></a-camera>
    </a-entity>

    <!-- الدائرة التي تظهر على الأرض (Reticle) -->
    <a-entity id="reticle" visible="false">
      <a-ring color="#d4af37" radius-inner="0.1" radius-outer="0.15" rotation="-90 0 0"></a-ring>
      <a-circle color="#d4af37" radius="0.05" rotation="-90 0 0" opacity="0.8"></a-circle>
    </a-entity>
    
  </a-scene>

  <script src="js/museum.js"></script>
</body>
</html>
