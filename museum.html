<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>متحف الواقع المعزز — متحفك الخاص</title>

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />

  <!-- مكتبة A-Frame فقط (بدون AR.js) لأننا نستخدم WebXR للأسطح -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
</head>
<body>

  <div id="museum-container">
    
    <!-- واجهة المستخدم لاختيار المجسمات -->
    <div id="museum-ui" style="display: flex;">
      <h3>اختر قطعة واضغط على الأرض لإضافتها</h3>
      <div class="items-row" id="museum-items">
        <!-- تتولد الأيقونات هنا برمجياً -->
      </div>
      <p style="font-size:0.8rem; color:#888; margin-top:10px;">انقر على أيقونة [AR] أسفل يمين الشاشة للبدء.</p>
      <a href="index.html" style="color: var(--accent); margin-top: 15px; text-decoration: none; font-size: 0.9rem;">العودة للجولة</a>
    </div>

    <!-- مشهد WebXR للأسطح -->
    <a-scene 
      id="webxr-scene"
      webxr="requiredFeatures: hit-test, local-floor;"
      renderer="colorManagement: true;"
      vr-mode-ui="enterVRButton: #btn-enter-ar">
      
      <a-light type="ambient" intensity="0.8"></a-light>
      <a-light type="directional" position="0.5 1 0.5" intensity="0.6" castShadow="true"></a-light>

      <a-entity ar-hit-test="target:#reticle">
        <a-camera position="0 1.6 0"></a-camera>
      </a-entity>

      <a-entity id="reticle" visible="false">
        <a-ring color="#d4af37" radius-inner="0.1" radius-outer="0.15" rotation="-90 0 0"></a-ring>
        <a-circle color="#d4af37" radius="0.05" rotation="-90 0 0" opacity="0.5"></a-circle>
      </a-entity>
    </a-scene>

  </div>

  <!-- ربط ملف برمجة المتحف -->
  <script src="js/museum.js"></script>
</body>
</html>
