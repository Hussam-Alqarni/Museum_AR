<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>متحفك الخاص - AR</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  
  <!-- مهم جداً: ترقية مكتبة A-Frame لنسخة 1.4.2 لحل مشاكل الكاميرا في الأندرويد -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  
  <style>
    .a-enter-vr { display: none !important; }
    
    .ar-action-btn {
      background: var(--accent); color: #0b0908; border: none; padding: 12px 20px;
      border-radius: 999px; font-weight: bold; font-size: 1rem; font-family: inherit;
      box-shadow: 0 4px 15px rgba(209, 177, 90, 0.4); cursor: pointer; transition: 0.1s;
      pointer-events: auto;
    }
    .ar-action-btn:active { transform: scale(0.95); }
    
    /* أزرار التحكم (إضافة ونقل) */
    #action-buttons {
      position: absolute; bottom: 140px; left: 50%; transform: translateX(-50%);
      display: none; gap: 10px; z-index: 1000; width: max-content;
    }

    #ar-loading {
      display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8); color: var(--sand); padding: 20px 40px; border-radius: 12px;
      font-weight: bold; font-size: 1.1rem; backdrop-filter: blur(5px); z-index: 1001;
    }
  </style>
</head>
<body style="touch-action: none;"> 

  <div id="ui-overlay">
    <div class="top-bar">
      <a href="index.html" class="btn-back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        العودة للرئيسية
      </a>
      <div class="instruction-badge" id="ar-instruction" style="display: none;">اضغط تشغيل الكاميرا للبدء</div>
    </div>

    <button id="btn-custom-ar" style="position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); padding: 15px 30px; background: linear-gradient(135deg, #d1b15a, #8a7342); color: white; font-weight: bold; border-radius: 999px; border: none; font-size: 1.1rem; box-shadow: 0 10px 30px rgba(209, 177, 90, 0.4); cursor: pointer; font-family: 'Tajawal', sans-serif;">
      تشغيل كاميرا الواقع المعزز
    </button>

    <div id="ar-loading">جاري تجهيز القطعة...</div>

    <!-- مجموعة أزرار التحكم الذكية -->
    <div id="action-buttons">
      <button id="btn-place-model" class="ar-action-btn">➕ إسقاط جديد</button>
      <button id="btn-move-model" class="ar-action-btn" style="background: #3d6b52; color: white; display: none;">📍 نقل لمكان الدائرة</button>
    </div>

    <div class="bottom-bar" id="bottom-panel" style="display: none;">
      <div class="items-carousel" id="museum-items"></div>
    </div>
  </div>

  <button id="hidden-vr" style="display: none;"></button>

  <!-- إعادة hit-test ليكون إجبارياً لكي يقوم الهاتف بتشغيل حساسات الأسطح -->
  <a-scene 
    id="webxr-scene"
    webxr="requiredFeatures: hit-test, dom-overlay; overlayElement: #ui-overlay;"
    renderer="colorManagement: true; physicallyCorrectLights: true;"
    vr-mode-ui="enterARButton: #btn-custom-ar; enterVRButton: #hidden-vr">
    
    <a-light type="ambient" intensity="1"></a-light>
    <a-light type="directional" position="1 2 0.5" intensity="1.2" castShadow="true"></a-light>
    
    <a-camera position="0 1.6 0" look-controls="touchEnabled: false"></a-camera>

    <!-- نظام تتبع الأسطح (يطلق شعاع ليزر من الكاميرا) -->
    <a-entity ar-hit-test="target:#reticle"></a-entity>
    
    <!-- الدائرة التي تلتصق بالجدران والطاولات -->
    <a-entity id="reticle" visible="false">
      <a-ring color="#d1b15a" radius-inner="0.08" radius-outer="0.12" rotation="-90 0 0"></a-ring>
      <a-circle color="#d1b15a" radius="0.04" rotation="-90 0 0" opacity="0.8"></a-circle>
    </a-entity>
  </a-scene>

  <script src="js/museum.js"></script>
</body>
</html>
