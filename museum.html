<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>متحفك الخاص - AR</title>

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>

  <style>
    /* إخفاء زر A-Frame الافتراضي الصغير المزعج بقوة */
    .a-enter-vr { display: none !important; }

    /* تصميم زر الإسقاط الجديد الاحترافي */
    .btn-place-model {
      position: absolute;
      bottom: 140px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: #0b0908;
      border: none;
      padding: 12px 24px;
      border-radius: 999px;
      font-weight: bold;
      font-size: 1.1rem;
      font-family: inherit;
      box-shadow: 0 4px 15px rgba(209, 177, 90, 0.4);
      cursor: pointer;
      display: none; /* يظهر فقط داخل الكاميرا */
      z-index: 1000;
      transition: transform 0.1s;
    }
    .btn-place-model:active {
      transform: translateX(-50%) scale(0.95);
    }
  </style>
</head>
<body>

  <div id="ui-overlay">
    
    <!-- الشريط العلوي -->
    <div class="top-bar">
      <a href="index.html" class="btn-back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        العودة للرئيسية
      </a>
      <div class="instruction-badge" id="ar-instruction" style="display: none;">
        اضغط على تشغيل الكاميرا للبدء
      </div>
    </div>

    <!-- زرنا الكبير المخصص -->
    <button id="btn-custom-ar" style="position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); padding: 15px 30px; background: linear-gradient(135deg, #d1b15a, #8a7342); color: white; font-weight: bold; border-radius: 999px; border: none; font-size: 1.1rem; box-shadow: 0 10px 30px rgba(209, 177, 90, 0.4); cursor: pointer; font-family: 'Tajawal', sans-serif;">
      تشغيل كاميرا الواقع المعزز
    </button>

    <!-- زر إسقاط المجسم (السر السحري لحل مشكلة الإضافة) -->
    <button id="btn-place-model" class="btn-place-model">➕ إسقاط المجسم هنا</button>

    <!-- شريط قائمة المجسمات -->
    <div class="bottom-bar" id="bottom-panel" style="display: none;">
      <div class="items-carousel" id="museum-items">
        <!-- تتولد الأزرار هنا -->
      </div>
    </div>

  </div>

  <!-- زر مخفي وهمي لربط الواقع الافتراضي به وإلغائه -->
  <button id="hidden-vr" style="display: none;"></button>

  <!-- إعدادات الكاميرا الدقيقة -->
  <!-- لاحظ أننا ربطنا زرنا المخصص بـ enterARButton -->
  <a-scene 
    id="webxr-scene"
    webxr="requiredFeatures: local-floor, dom-overlay; overlayElement: #ui-overlay;"
    renderer="colorManagement: true; physicallyCorrectLights: true;"
    vr-mode-ui="enterARButton: #btn-custom-ar; enterVRButton: #hidden-vr">
    
    <a-light type="ambient" intensity="1"></a-light>
    <a-light type="directional" position="1 2 0.5" intensity="1.2" castShadow="true"></a-light>

    <a-camera position="0 1.6 0"></a-camera>
    
  </a-scene>

  <script src="js/museum.js"></script>
</body>
</html>
