<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>متحف الواقع المعزز — جولة الماركرات</title>

  <!-- الخطوط والتصميم -->
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />

  <!-- مكتبات A-Frame و AR.js و Model-Viewer -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.7/aframe/build/aframe-ar.js"></script>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>

  <div id="tour-container">
    
    <!-- شاشة الترحيب -->
    <section id="welcome-screen">
      <h1 style="color:var(--accent);">متحف الواقع المعزز</h1>
      <p style="color:#bbb; max-width: 400px; line-height: 1.8;">
        وجّه كاميرا هاتفك نحو الماركرات المخصصة لاكتشاف القطع الأثرية بـ 360 درجة.
      </p>
      <button id="btn-start" class="btn-gold" style="margin-top: 20px;">افتح الكاميرا</button>
    </section>

    <!-- واجهة البحث عن الماركر -->
    <div id="scan-ui">
      <div id="hint-scan">ابحث عن الماركر لعرض القطعة...</div>
    </div>

    <!-- الصفحة الفارغة لعرض المجسم 360 -->
    <div id="model-360-view">
      <h1 id="viewer-title">AR Museum - Artifact</h1>
      <model-viewer
        id="mv-element"
        src=""
        alt="Artifact"
        camera-controls
        ar
        shadow-intensity="1"
        exposure="1">
      </model-viewer>
      <div class="viewer-footer">
        <button id="btn-next" class="btn-gold">القطعة التالية</button>
      </div>
    </div>

    <!-- شاشة النهاية -->
    <div id="done-screen">
      <h2 style="color:var(--accent);">اكتملت الجولة!</h2>
      <p style="color:#ddd; margin-bottom: 30px;">الآن يمكنك الدخول لتصميم متحفك الخاص في مساحتك الحقيقية.</p>
      <!-- التوجيه إلى صفحة المتحف الجديدة -->
      <a href="museum.html" class="btn-gold">دخول المتحف الخاص (مساحة حرة)</a>
    </div>

    <!-- حاوية مشهد AR.js -->
    <div id="arjs-scene-wrapper"></div>
  </div>

  <!-- ربط ملف برمجة الجولة -->
  <script src="js/tour.js"></script>
</body>
</html>
